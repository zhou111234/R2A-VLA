exclude: third_party/|.*\.Dockerfile$|Dockerfile\..*|.*test.*\.py$|test_.*\.py$

repos:
  - repo: https://github.com/astral-sh/uv-pre-commit
    # uv version.
    rev: 0.5.14
    hooks:
      - id: uv-lock
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.8.6
    hooks:
      # Run the linter.
      - id: ruff
        args: [--fix]
        exclude: .*\.Dockerfile$|Dockerfile\..*|.*test.*\.py$|test_.*\.py$
      - id: ruff-format
        exclude: .*\.Dockerfile$|Dockerfile\..*|.*test.*\.py$|test_.*\.py$