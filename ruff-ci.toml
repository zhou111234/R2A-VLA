# Ruff configuration for pre-commit
# This file extends pyproject.toml with additional ignore rules for CI

[lint]
extend-ignore = [
    "SLF001",  # Private member access
    "PTH123",  # Path.open() vs open()
    "PLC0415", # Import at top-level
    "RET504",  # Unnecessary assignment
    "UP038",   # X | Y in isinstance
    "SIM102",  # Nested if statements
    "FBT003",  # Boolean positional value
    "FBT002",  # Boolean default argument
    "E741",    # Ambiguous variable name
    "B905",    # zip() strict parameter
    "PTH118",  # os.path.join() vs Path
    "PTH120",  # os.path.dirname() vs Path.parent
    "PTH119",  # os.path.basename() vs Path.name
    "PTH103",  # os.makedirs() vs Path.mkdir
    "PTH111",  # os.path.expanduser() vs Path.expanduser
    "PTH110",  # os.path.exists() vs Path.exists
    "RET505",  # Unnecessary else after return
    "SIM115",  # Context manager for open
    "C414",    # Unnecessary list() in sorted
    "PERF402", # Use list.copy
    "PLW2901", # For loop variable overwritten
    "PLR1714", # Multiple comparisons
    "UP031",   # Format specifiers
    "PLW1508", # Invalid env default
    "E501",    # Line too long
    "N806",    # Variable name case
    "N803",    # Argument name case
    "PLC0206", # Dict iter items
    "F821",    # Undefined name (false positives in ML code)
    "F722",    # Syntax error in forward annotation (JAX typing)
    "E402",    # Module level import not at top (common in ML code)
]
